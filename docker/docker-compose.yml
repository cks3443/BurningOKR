name: "burning-okr"

services:
  db:
    image: postgres:15.3
    container_name: burning-okr-postgres
    restart: unless-stopped
    env_file:
      - ./postgres.env
    volumes:
      - b-okr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - b-okr-backend-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: burningokr/backend:local
    container_name: burning-okr-backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - b-okr-frontend-network
      - b-okr-backend-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: burningokr/frontend:local
    container_name: burning-okr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - b-okr-frontend-network

volumes:
  b-okr-pgdata:

networks:
  b-okr-frontend-network:
  b-okr-backend-network:
